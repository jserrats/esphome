substitutions:
  name: "esp-w-068"
  friendly_name: "ESP-W-068"

esphome:
  name: "${name}"


psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_pass
  # Disable Wi-Fi power save: lower-latency API round-trips for the voice pipeline.
  power_save_mode: none
  use_address: esp-w-068.iot

external_components:
  - source: github://kylehase/ESPHome-ST7305-RLCD
    components: [st7305_rlcd]

i2c:
  sda: GPIO13
  scl: GPIO14
  scan: true
  id: bus_a

spi:
  clk_pin: GPIO11
  mosi_pin: GPIO12

font:
  - file: "config/pixel.ttf"
    id: font_time
    size: 110
    glyphs: " :0123456789"
  - file: "config/pixel.ttf"
    id: font_sec
    size: 44
    glyphs: " :0123456789"
  - file: "config/pixel.ttf"
    id: font_day
    size: 34
    glyphs: " ,.0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "config/pixel.ttf"
    id: font_date
    size: 24
    glyphs: " ,.0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "config/pixel.ttf"
    id: font_status
    size: 24
    glyphs: " ,.0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file: "config/pixel.ttf"
    id: font_notif
    size: 24
    glyphs: " !'(),-./0123456789:;?ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"

text_sensor:
  - platform: homeassistant
    id: notification_details
    entity_id: input_text.notification_details
    on_value:
      # Refresh the screen now, then auto-clear the banner 60s after the latest update.
      - component.update: my_display
      - if:
          condition:
            lambda: 'return !x.empty();'
          then:
            - script.execute: clear_notification

script:
  - id: clear_notification
    mode: restart
    then:
      - delay: 60s
      - lambda: 'id(notification_details).publish_state("");'
      - component.update: my_display

display:
  - platform: st7305_rlcd
    model: WAVESHARE_400X300
    id: my_display
    width: 400
    height: 300
    cs_pin: GPIO40
    dc_pin: GPIO5
    reset_pin: GPIO41
    data_rate: 1MHz
    update_interval: 1s
    lambda: |-
      // Notification banner across the top: centered, wraps to a 2nd line past 20 chars.
      std::string note = id(notification_details).state;
      if (!note.empty()) {
        const size_t maxlen = 20;
        std::string l1 = note, l2 = "";
        if (note.length() > maxlen) {
          size_t brk = note.rfind(' ', maxlen);
          if (brk == std::string::npos || brk == 0) brk = maxlen;  // no space -> hard split
          l1 = note.substr(0, brk);
          size_t s = (brk < note.length() && note[brk] == ' ') ? brk + 1 : brk;
          l2 = note.substr(s, maxlen);
        }
        it.print(200, 4, id(font_notif), TextAlign::TOP_CENTER, l1.c_str());
        if (!l2.empty())
          it.print(200, 32, id(font_notif), TextAlign::TOP_CENTER, l2.c_str());
      }

      auto t = id(sntp_time).now();
      if (!t.is_valid()) {
        it.print(200, 150, id(font_day), TextAlign::CENTER, "Syncing time...");
        return;
      }
      // Big HH:MM clock
      it.strftime(200, 130, id(font_time), TextAlign::CENTER, "%H:%M", t);

      // Status badge (left) + seconds (right), anchored to a fixed center
      // divider so neither shifts as the second digits change width.
      std::string ss = t.strftime("%S");
      std::string st = id(va_state);
      int ox, oy, sw, sh, tw, th;
      it.get_text_bounds(0, 0, ss.c_str(), id(font_sec),    TextAlign::TOP_LEFT, &ox, &oy, &sw, &sh);
      it.get_text_bounds(0, 0, st.c_str(), id(font_status), TextAlign::TOP_LEFT, &ox, &oy, &tw, &th);
      const int pad_x = 8, gap = 16, row_top = 195, center_x = 200;
      const int box_w = tw + 2 * pad_x;
      const int box_h = sh;
      // Black badge: right edge pinned just left of center (depends only on status text)
      const int box_x = center_x - gap / 2 - box_w;
      it.filled_rectangle(box_x, row_top, box_w, box_h);
      it.print(box_x + pad_x, row_top + box_h / 2, id(font_status),
               COLOR_OFF, TextAlign::CENTER_LEFT, st.c_str());                 // inverted (white) text
      // Seconds: left edge pinned just right of center, grows rightward
      it.print(center_x + gap / 2, row_top, id(font_sec), TextAlign::TOP_LEFT, ss.c_str());
      // Divider line
      it.line(70, 248, 330, 248);
      // Weekday + full date along the bottom
      it.strftime(200, 262, id(font_date), TextAlign::TOP_CENTER, "%A, %d %B %Y", t);

i2s_audio:
  - id: i2s_out
    i2s_lrclk_pin:
      number: GPIO45
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO9
      allow_other_uses: true
    i2s_mclk_pin:
      number: GPIO16
      allow_other_uses: true
  - id: i2s_in
    i2s_lrclk_pin:
      number: GPIO45
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO9
      allow_other_uses: true
    i2s_mclk_pin:
      number: GPIO16
      allow_other_uses: true

audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 16000

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 24dB

microphone:
  - platform: i2s_audio
    id: va_mic
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO10
    adc_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    pdm: false

api:

globals:
  - id: va_state
    type: std::string
    restore_value: no
    initial_value: '"Idle"'

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Madrid
    on_time_sync:
      - component.update: my_display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    components:
      - espressif/esp-nn==1.1.2

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO8
    dac_type: external
    audio_dac: es8311_dac
    channel: left
    sample_rate: 16000
    bits_per_sample: 16bit
    buffer_duration: 100ms
    timeout: never

  - platform: resampler
    id: announcement_speaker
    output_speaker: i2s_audio_speaker

media_player:
  - platform: speaker
    id: speaker_media_player
    name: "${friendly_name} Speaker"
    announcement_pipeline:
      speaker: announcement_speaker
      format: FLAC
      sample_rate: 16000
      num_channels: 1
    files:
      - id: wake_word_triggered_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac

voice_assistant:
  id: va
  microphone:
    microphone: va_mic
    channels: 0
    gain_factor: 4
  media_player: speaker_media_player
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  on_listening:
    - lambda: 'id(va_state) = "Listening";'
    - component.update: my_display
  on_stt_end:
    - lambda: 'id(va_state) = "Waiting";'
    - component.update: my_display
  on_tts_start:
    - lambda: 'id(va_state) = "Speaking";'
    - component.update: my_display
  on_end:
    - lambda: 'id(va_state) = "Idle";'
    - component.update: my_display
  on_error:
    - lambda: 'id(va_state) = "Error";'
    - component.update: my_display

switch:
  - platform: gpio
    name: "Speaker Enable"
    pin: GPIO46
    restore_mode: RESTORE_DEFAULT_ON

binary_sensor:
  # Tap to talk: press once -> beep -> the assistant listens (HA ends it on silence).
  - platform: gpio
    name: "Boot Button"
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT
    filters:
      - delayed_on: 30ms
    on_press:
      # Only beep + start when no interaction is already running, so a second
      # tap can't overlap the beep or restart the pipeline.
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - media_player.speaker.play_on_device_media_file:
                media_file: wake_word_triggered_sound
                announcement: true
            - delay: 300ms
            - voice_assistant.start:

  # Key button cancels / stops the current voice interaction.
  - platform: gpio
    name: "Key Button"
    pin:
      number: GPIO18
      inverted: true
      mode: INPUT
    filters:
      - delayed_on: 30ms
    on_press:
      - voice_assistant.stop:

number:
  - platform: template
    name: "TTS Volume"
    id: tts_volume
    icon: mdi:volume-high
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 75
    optimistic: true
    restore_value: true
    set_action:
      then:
        - media_player.volume_set:
            id: speaker_media_player
            volume: !lambda "return x / 100.0;"